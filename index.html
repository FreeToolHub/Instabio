 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InstaBio - Advanced Instagram Bio Generator</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>
<body>

<div class="container">

<h1>🚀 InstaBio Generator</h1>
<p>Create unique Instagram bios instantly</p>

<div class="card">

<input type="text" id="name" placeholder="Your Name">

<select id="niche">
<option value="creator">Content Creator</option>
<option value="fitness">Fitness</option>
<option value="business">Business</option>
<option value="tech">Tech</option>
<option value="gamer">Gamer</option>
<option value="student">Student</option>
<option value="motivation">Motivational</option>
</select>

<select id="tone">
<option value="professional">Professional</option>
<option value="cool">Cool</option>
<option value="premium">Premium</option>
<option value="minimal">Minimal</option>
</select>

<button onclick="generateBio()">Generate Bio</button>

<textarea id="output"></textarea>

<button onclick="copyBio()">Copy Bio</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
